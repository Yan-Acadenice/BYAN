version: '3.8'

services:
  parakeet-server:
    image: nvcr.io/nvidia/nemo:24.07
    ports:
      - "8001:8001"
    environment:
      - MODEL_NAME=nvidia/parakeet-tdt-0.6b-v2
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - parakeet-models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    command: >
      python -c "
      from nemo.collections.asr.models import EncDecRNNTBPEModel;
      import json, http.server, io, soundfile as sf, numpy as np;
      model = EncDecRNNTBPEModel.from_pretrained('nvidia/parakeet-tdt-0.6b-v2');

      class Handler(http.server.BaseHTTPRequestHandler):
          def do_GET(self):
              if self.path == '/health':
                  self.send_response(200);
                  self.end_headers();
                  self.wfile.write(b'ok');
              else:
                  self.send_response(404);
                  self.end_headers();
          def do_POST(self):
              length = int(self.headers['Content-Length']);
              audio_bytes = self.rfile.read(length);
              audio, sr = sf.read(io.BytesIO(audio_bytes));
              transcription = model.transcribe([audio]);
              result = json.dumps({'text': transcription[0] if transcription else ''});
              self.send_response(200);
              self.send_header('Content-Type', 'application/json');
              self.end_headers();
              self.wfile.write(result.encode());
          def log_message(self, format, *args):
              pass;

      httpd = http.server.HTTPServer(('', 8001), Handler);
      print('Parakeet TDT server listening on port 8001');
      httpd.serve_forever()
      "

volumes:
  parakeet-models:
